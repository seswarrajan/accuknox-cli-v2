server:
  port: :6060
  basepath: /pea

application:
  name: policy-enf-agent

spire:
  {{ if .ProxyEnabled }}
  enable: false
  {{ else }}
  enable: true
  {{ end }}
  agent: "unix:///var/run/spire/agent.sock"

endpoint:
  urlendpoint: /pps/api/v1/policy-provider/fetch-policy
  baseurlendpoint: https://{{.PPSHost}}
  fetch-policy-status: /pps/api/v2/policy-provider/policy-status

statusendpoint:
  endpoint: https://{{.PPSHost}}/pps/api/v1/policy-provider/change-status-policy

syncuptime:
  t: 5

kmux-config-file: {{.KmuxConfigPath}}

annotation:
  statusendpoint: /pps/api/v1/policy-provider/update-annotation-status
  annotationendpoint: /pps/api/v1/policy-provider/fetch-annotations
  basepath: https://{{.PPSHost}}

non-k8s:
  enable: true
  policy-server-port: 32770
  policy-list-kmux: {{.PoliciesListKmuxConfig}}
  policy-list-topic: {{.PoliciesTopic}}
tls:
  enabled: {{ or .TlsEnabled .RMQEnabled }}
  policy:
    topic: {{.PoliciesTopic}}
    kmux-config: {{.PoliciesKmuxConfig}}
    enabled: {{ or .TlsEnabled .RMQEnabled }}
  state:
    enabled: false
    topic: {{.StateEventTopic}}
    kmux-config: {{.StateKmuxConfig}}

policy-watcher:
  enable: false
  delay: 00h00m10s
  topic: discovery/custom-policy-v1
  watchers: 
    KubeArmorPolicy:
      - selector.matchLabels
      - selector.matchExpressions
    KubeArmorHostPolicy:
      - nodeSelector.matchLabels
    NetworkPolicy:
      - podSelector.matchLabels
    KubeArmorClusterPolicy:
      - selector.matchExpressions
    AdmissionPolicy:

deployMode: "vm"

reconciler:
  enable: true
  interval: 30m

log-level: info

proxy:
  enabled: {{.ProxyEnabled}}
  address: {{.ProxySaaSAddr}}

connect-rpc:
  enabled: true
  server: https://{{.PPSHost}}

health:
  enabled: true
  interval: 00h05m00s
  threshold: 3
  {{- if eq .VmMode "systemd" }}
  url: http://localhost:9090/live
  {{- else }}
  url: http://spire-agent:9090/live
  {{- end }}