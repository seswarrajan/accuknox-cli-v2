# tools.yaml — external tools bundled/downloaded with knoxctl
#
# Each tool becomes a knoxctl subcommand: knoxctl <name> [options]
# install_as: binary filename after download (top-level default, override per platform)
# Omit a platform/arch entry if the tool is not available there.
# sha256 is optional but recommended for integrity verification.

tools:
  - name: sbomgen
    description: "Generate Software Bill of Materials (SBOM)"
    install_as: sbomgen
    version: "12.1.3"
    platforms:
      linux:
        amd64:
          source: https://github.com/cdxgen/cdxgen/releases/download/v12.1.3/cdxgen-linux-amd64-musl-slim
          sha256: "620634d6049604857d7567b416a911c287f09f25a9b097439f410ea89511c014"
        arm64:
          source: https://github.com/cdxgen/cdxgen/releases/download/v12.1.3/cdxgen-linux-arm64-musl-slim
          sha256: "8ad3dcf32e7d353a2828153cac9239e26e70f25a29d0dfcb1ae585b7342f7c8f"
      darwin:
        amd64:
          source: https://github.com/cdxgen/cdxgen/releases/download/v12.1.3/cdxgen-darwin-amd64-slim
          sha256: "3b28bd9605fde424916dd5db1ff18807e7913661b8ff3651eec7130126b40313"
        arm64:
          source: https://github.com/cdxgen/cdxgen/releases/download/v12.1.3/cdxgen-darwin-arm64-slim
          sha256: "33acfd5b500f7e576cc2f6f85128af51d412e4f06a85107b10d3a326a07bfa3b"
      windows:
        amd64:
          source: https://github.com/cdxgen/cdxgen/releases/download/v12.1.3/cdxgen-windows-amd64-slim.exe
          sha256: "7270ba63cd85c58af44ff3aa18e19b98c9842506e6f4257ce8d9b08fb15a6475"
          install_as: sbomgen.exe

  - name: imgscan
    description: "Container and filesystem vulnerability scanner"
    install_as: imgscan
    version: "0.69.3"
    builtin: true   # binary is built from pkg/imagescan/trivy submodule via 'make prebuild'

  - name: pkgscan
    description: "Scan packages and create BOM from the packages"
    install_as: pkgscan
    version: "1.42.3"
    platforms:
      linux:
        amd64:
          source: https://github.com/anchore/syft/releases/download/v1.42.3/syft_1.42.3_linux_amd64.tar.gz
          binary: syft
        arm64:
          source: https://github.com/anchore/syft/releases/download/v1.42.3/syft_1.42.3_linux_arm64.tar.gz
          binary: syft
      darwin:
        amd64:
          source: https://github.com/anchore/syft/releases/download/v1.42.3/syft_1.42.3_darwin_amd64.tar.gz
          binary: syft
        arm64:
          source: https://github.com/anchore/syft/releases/download/v1.42.3/syft_1.42.3_darwin_arm64.tar.gz
          binary: syft
      windows:
        amd64:
          source: https://github.com/anchore/syft/releases/download/v1.42.3/syft_1.42.3_windows_amd64.zip
          binary: syft.exe
          install_as: pkgscan.exe

