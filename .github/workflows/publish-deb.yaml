name: Build and publish .deb on release

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg-dev curl gh

      - name: Build .deb and upload to Nexus
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEXUS_URL: https://nexus.accuknox.com/repository/knoxctl/
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
          TAG: ${{ inputs.tag_name || github.event.release.tag_name }}

        run: |
          set -euo pipefail

          if [ -z "${NEXUS_USERNAME:-}" ] || [ -z "${NEXUS_PASSWORD:-}" ]; then
            echo "ERROR: NEXUS_USERNAME and NEXUS_PASSWORD must be set as secrets"
            exit 1
          fi

          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY:-${{ github.repository }}}"
          ASSETS=("knoxctl_${VERSION}_linux_amd64.tar.gz" "knoxctl_${VERSION}_linux_arm64.tar.gz")

          echo "Packaging release ${TAG} (version=${VERSION})"

          echo "Listing assets in release ${TAG}:"
          gh release view "${TAG}" --repo "${REPO}" || echo "Could not view release ${TAG}"

          for asset in "${ASSETS[@]}"; do
            echo "Processing asset: $asset"

            if ! gh release download "${TAG}" --pattern "$asset" --repo "$REPO"; then
              echo "Failed to download $asset"
              exit 1
            fi

            rm -rf extract_tmp pkgroot_* || true
            mkdir -p extract_tmp
            tar -xzf "$asset" -C extract_tmp

            if [[ "$asset" == *"amd64"* ]]; then
              DEB_ARCH="amd64"
            elif [[ "$asset" == *"arm64"* ]]; then
              DEB_ARCH="arm64"
            else
              echo "Unknown arch for asset $asset"
              exit 1
            fi

            PKGROOT="$(pwd)/pkgroot_${DEB_ARCH}"
            rm -rf "$PKGROOT"
            mkdir -p "$PKGROOT/usr/local/bin"

            BIN_PATH=""
            if [ -f extract_tmp/knoxctl ]; then
              BIN_PATH="extract_tmp/knoxctl"
            else
              BIN_PATH="$(find extract_tmp -maxdepth 3 -type f -name knoxctl | head -n1 || true)"
            fi

            if [ -z "$BIN_PATH" ] || [ ! -f "$BIN_PATH" ]; then
              echo "Could not find 'knoxctl' binary inside $asset"
              ls -R extract_tmp || true
              exit 1
            fi

            cp "$BIN_PATH" "$PKGROOT/usr/local/bin/knoxctl"
            chmod 0755 "$PKGROOT/usr/local/bin/knoxctl"

            echo "Creating DEBIAN/control for arch=$DEB_ARCH"

            DEBIAN_DIR="$PKGROOT/DEBIAN"
            mkdir -p "$DEBIAN_DIR"

            echo "Package: knoxctl" > "$DEBIAN_DIR/control"
            echo "Version: $VERSION" >> "$DEBIAN_DIR/control"
            echo "Architecture: $DEB_ARCH" >> "$DEBIAN_DIR/control"
            echo "Maintainer: Ramakant <ramakant@accuknox.com>, Vishnu <vishnu@accuknox.com>" >> "$DEBIAN_DIR/control"
            echo "Description: " >> "$DEBIAN_DIR/control"
            echo "    CLI for kubearmor client" >> "$DEBIAN_DIR/control"

            chmod 0755 "$DEBIAN_DIR"
            chmod 0644 "$DEBIAN_DIR/control"

            OUTPUT_DEB="knoxctl_${VERSION}_${DEB_ARCH}.deb"
            dpkg-deb --build "$PKGROOT" "$OUTPUT_DEB"

            if [ ! -f "$OUTPUT_DEB" ]; then
              echo "Failed to build $OUTPUT_DEB"
              ls -la
              exit 1
            fi

            echo "Uploading $OUTPUT_DEB to Nexus"
            curl -v -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" \
              -X POST \
              ${NEXUS_URL%/}/service/rest/v1/components?repository=Knox \
              -F "apt.asset=@$OUTPUT_DEB"

            echo "Uploaded $OUTPUT_DEB"

            rm -f *.deb
            rm -rf extract_tmp "$PKGROOT" "$asset"
          done

          echo "All done."
